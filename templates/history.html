<!DOCTYPE html>
<html>
<head>
    <title>Mood History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="font-family: Arial; background-color: #f5f5f5;">

    <!-- HEADER -->
    <div style="background-color:#4CAF50; padding:15px; color:white;">
        <h2>📜 Mood History</h2>
    </div>

    <div style="padding:20px;">

        <!-- BACK BUTTON -->
        <a href="/dashboard">
            <button style="padding:10px 15px; margin-bottom:20px;">⬅ Back to Dashboard</button>
        </a>

        <!-- MOOD LIST -->
        {% if moods %}
            {% for mood in moods %}
                <div style="background:white; padding:15px; margin-bottom:15px; border-radius:10px; box-shadow:0px 2px 5px rgba(0,0,0,0.1);">

                    <p><strong>😊 Mood:</strong> {{ mood[2] }}</p>

                    <p><strong>📝 Note:</strong> {{ mood[3] }}</p>

                    <p><strong>🧠 Sentiment:</strong> {{ mood[4] }}</p>

                    <p><strong>📅 Date:</strong> {{ mood[5] }}</p>

                </div>
            {% endfor %}
        {% else %}
            <p>No mood entries yet.</p>
        {% endif %}

    </div>

</body>
</html>
