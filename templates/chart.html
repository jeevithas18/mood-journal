<!DOCTYPE html>
<html>
<head>
    <title>Mood Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="font-family: Arial; background-color: #f5f5f5;">

    <!-- HEADER -->
    <div style="background-color:#4CAF50; padding:15px; color:white;">
        <h2>📊 Mood Trend Chart</h2>
    </div>

    <div style="padding:20px;">

        <!-- BACK BUTTON -->
        <a href="/dashboard">
            <button style="padding:10px 15px; margin-bottom:20px;">⬅ Back to Dashboard</button>
        </a>

        <!-- CHART -->
        <div style="background:white; padding:20px; border-radius:10px;">
            <canvas id="moodChart"></canvas>
        </div>

    </div>

    <script>
        const ctx = document.getElementById('moodChart').getContext('2d');

        const moodChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: {{ dates | tojson }},
                datasets: [{
                    label: 'Mood Level',
                    data: {{ moods | tojson }},
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            stepSize: 1,
                            callback: function(value) {
                                if (value == 1) return "😢";
                                if (value == 2) return "😕";
                                if (value == 3) return "😐";
                                if (value == 4) return "🙂";
                                if (value == 5) return "😄";
                            }
                        }
                    }
                }
            }
        });
    </script>

</body>
</html>
