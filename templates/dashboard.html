<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-success">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">💙 Mood Journal</span>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </nav>

    <div class="container mt-4">

        <!-- SUGGESTION -->
        <div class="alert alert-info">
            <h5>💡 Suggestion</h5>
            <p>{{ suggestion }}</p>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="d-flex gap-3 mb-4">
            <a href="/add-mood" class="btn btn-primary">➕ Add Mood</a>
            <a href="/history" class="btn btn-secondary">📜 History</a>
            <a href="/chart" class="btn btn-warning">📊 Chart</a>
        </div>

        <!-- WELCOME CARD -->
        <div class="card shadow-sm">
            <div class="card-body">
                <h4>👋 Welcome!</h4>
                <p>Track your mood and improve your mental wellness 💙</p>
            </div>
        </div>

    </div>

</body>
</html>
